<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mảnh Ghép Kỳ Hà - Tân Niên 2026</title>
    <style>
        /* === RESET & CƠ BẢN === */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; user-select: none; }
        body { 
            width: 100vw; height: 100vh; overflow: hidden; 
            background: linear-gradient(135deg, #0b192c 0%, #1a365d 100%);
            color: white; display: flex; flex-direction: column;
        }

        /* === HEADER & AUDIO === */
        header {
            height: 10vh; display: flex; justify-content: space-between; align-items: center; padding: 0 30px;
            background: rgba(0,0,0,0.3); border-bottom: 2px solid #ffd700;
        }
        h1 { color: #ffd700; text-transform: uppercase; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); font-size: 3vh;}
        
        .controls { display: flex; align-items: center; }
        .controls button {
            padding: 10px 15px; font-size: 1.8vh; font-weight: bold; border-radius: 8px; cursor: pointer;
            background: linear-gradient(to bottom, #ffd700, #d4af37); color: #0b192c; border: none; margin-left: 10px;
            transition: transform 0.2s;
        }
        .controls button.btn-settings { background: linear-gradient(to bottom, #bdc3c7, #2c3e50); color: white;}
        .controls button.btn-undo { background: linear-gradient(to bottom, #ff9ff3, #f368e0); color: white;}
        .controls button:active { transform: scale(0.95); }

        /* THANH ĐIỀU CHỈNH ÂM LƯỢNG */
        .bgm-control {
            display: flex; align-items: center; background: rgba(0,0,0,0.6); padding: 5px 12px; 
            border-radius: 30px; border: 2px solid #ffd700; gap: 5px; margin-right: 10px;
        }
        .bgm-control input[type=range] { width: 80px; cursor: pointer; accent-color: #ffd700; }

        /* === LAYOUT CHÍNH === */
        .main-container { display: flex; height: 90vh; width: 100vw; padding: 20px; }

        /* === VÒNG QUAY TÊN CUỘN DỌC === */
        .left-panel {
            flex: 1; margin-right: 20px; 
            background: rgba(255,255,255,0.05); border-radius: 15px; border: 1px solid rgba(255,215,0,0.3);
            display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px;
            text-align: center;
        }
        .spinner-box {
            width: 90%; height: 15vh; background: #000; border: 4px solid #ffd700; border-radius: 15px;
            position: relative; overflow: hidden; margin-bottom: 20px;
            box-shadow: inset 0 0 20px rgba(255,215,0,0.2);
        }
        .spinner-list {
            position: absolute; top: 0; left: 0; width: 100%;
            transition: transform 6s cubic-bezier(0.15, 0.9, 0.25, 1);
        }
        .spinner-item {
            height: 15vh; display: flex; align-items: center; justify-content: center;
            font-size: 5vh; font-weight: bold; color: #fff; text-shadow: 0 0 10px #ffd700; white-space: nowrap;
        }
        .spinner-item.winner {
            color: #ff4757; transform: scale(1.3); text-shadow: 0 0 20px #ff4757; transition: all 0.5s ease;
        }

        .btn-spin {
            padding: 15px 40px; font-size: 3vh; background: #ff4757; color: white; border: 2px solid #fff;
            border-radius: 50px; cursor: pointer; text-transform: uppercase; font-weight: bold;
            box-shadow: 0 5px 15px rgba(255, 71, 87, 0.4); transition: 0.2s;
        }
        .btn-spin:active { transform: scale(0.95); }

        /* === BẢNG 6 Ô TRÒN CHỌN CÂU HỎI === */
        .right-panel { flex: 2; display: flex; align-items: center; justify-content: center; }
        .grid-container { 
            display: grid; width: 100%; height: 100%; 
            grid-gap: 20px; justify-items: center; align-items: center;
        }
        .flip-card { perspective: 1000px; cursor: pointer; width: 32vh; height: 32vh; }
        .flip-card-inner { position: relative; width: 100%; height: 100%; text-align: center; transition: transform 0.6s; transform-style: preserve-3d; }
        .flip-card.flipped .flip-card-inner { transform: rotateY(180deg); }
        .flip-card-front, .flip-card-back {
            position: absolute; width: 100%; height: 100%; backface-visibility: hidden;
            display: flex; align-items: center; justify-content: center; flex-direction: column;
            border-radius: 50%; border: 4px solid #ffd700; padding: 10px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5); overflow: hidden; 
        }
        .flip-card-front { background: radial-gradient(circle, #d4af37 0%, #8a6d1c 100%); color: #fff; }
        .flip-card-back { 
            background: #fff; color: #0b192c; transform: rotateY(180deg); 
            font-size: 3vh; font-weight: bold; text-transform: uppercase; padding: 25px;
            word-wrap: break-word; text-align: center;
        }
        .flip-card.opened { opacity: 0.5; pointer-events: none; }

        /* === BẢNG CÂU HỎI MẢNH GHÉP TRÁI === */
        .puzzle-sidebar { flex: 0 0 auto; display: flex; flex-direction: column; justify-content: center; gap: 0.8vh; height: 100%; }
        .puzzle-row { display: flex; gap: 4px; cursor: pointer; transition: transform 0.2s; align-items: center; }
        .puzzle-row:hover { transform: scale(1.02); filter: brightness(1.1); }
        .puzzle-row.disabled { pointer-events: none; opacity: 0.8; filter: grayscale(0.5); }
        .puzzle-cell {
            width: min(45px, 3.8vh); height: min(45px, 3.8vh); background: #fff; color: #fff; 
            border-radius: 4px; display: flex; align-items: center; justify-content: center; pointer-events: none;
            font-size: min(24px, 2.5vh); font-weight: bold; text-transform: uppercase;
            box-shadow: inset 0 -3px 0 rgba(0,0,0,0.2); transition: all 0.8s; position: relative; overflow: hidden;
        }
        .puzzle-cell::after { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(135deg, rgba(255,255,255,0.4) 0%, rgba(255,255,255,0) 50%); }
        .puzzle-cell.highlight { border: 3px solid #ffd700; background: #fff8dc; color: #fff8dc; box-sizing: border-box;}
        .puzzle-cell.revealed { color: #333; background: #fff; transform: rotateY(360deg); }
        .puzzle-cell.revealed::after { display: none; }
        .puzzle-cell.revealed.highlight { color: #d32f2f; background: #ffd700; box-shadow: 0 0 15px #ffd700; border: none; }
        .puzzle-row-num {
            width: min(45px, 3.8vh); height: min(45px, 3.8vh); display: flex; align-items: center; justify-content: center; pointer-events: none;
            font-weight: bold; color: #ffd700; font-size: min(20px, 2vh);
            background: rgba(0,0,0,0.4); border-radius: 4px; margin-right: 5px; border: 1px solid rgba(255,215,0,0.3);
        }

        /* KHUNG CHỨA MẢNH GHÉP */
        .puzzle-image-wrapper { flex: 1; position: relative; width: 100%; min-height: 0; border: 6px solid #ffd700; border-radius: 12px; overflow: hidden; background: #000; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #secretImage { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        #tilesContainer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2;}
        
        .final-keyword-container { flex: 0 0 auto; display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; padding: 10px; background: rgba(0,0,0,0.3); border-radius: 12px; border: 2px solid rgba(255,215,0, 0.3); }
        .final-cell { width: min(45px, 4.5vh); height: min(45px, 4.5vh); border: 3px dashed #ffd700; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: min(28px, 3.5vh); font-weight: bold; color: rgba(255,215,0, 0.3); text-transform: uppercase; background: rgba(0,0,0,0.2); transition: all 0.5s; box-sizing: border-box; }
        .final-cell.filled { border: 3px solid #ffd700; color: #ffd700; background: rgba(170, 0, 0, 0.8); box-shadow: 0 0 10px #ffd700; animation: dropIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .final-cell.victory { background: #ffd700; color: #d32f2f; border: 3px solid #fff; box-shadow: 0 0 20px #ffd700; transform: scale(1.1); }
        @keyframes dropIn { from { transform: translateY(-50px) scale(1.5); opacity: 0; } to { transform: translateY(0) scale(1); opacity: 1; } }

        /* === POPUP CÂU HỎI === */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.85); z-index: 1000; align-items: center; justify-content: center; flex-direction: column;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: #fff; border-radius: 20px; padding: 30px; width: 85vw; max-width: 800px; max-height: 95vh; text-align: center; color: #0b192c;
            box-shadow: 0 0 30px #ffd700; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative;
        }
        .modal-title { font-size: 4vh; color: #e84118; margin-bottom: 10px; text-transform: uppercase; }
        
        .timer-display { font-size: 7vh; font-weight: bold; color: #2ecc71; margin-bottom: 15px; text-shadow: 1px 1px 2px rgba(0,0,0,0.2); display: flex; align-items:center; justify-content:center; width: 120px; height: 120px; border-radius: 50%; border: 4px solid #ffd700; box-shadow: 0 0 20px rgba(255,215,0,0.5); margin: 0 auto 25px;}
        @keyframes blink-danger { 0% { opacity: 1; color: #ff4757; transform: scale(1.1); } 50% { opacity: 0; } 100% { opacity: 1; color: #ff4757; transform: scale(1.1); } }
        .timer-display.danger { animation: blink-danger 0.5s infinite !important; color: #ff4757 !important; border-color: #ff4757;}

        .btn-group { display: flex; gap: 15px; justify-content: center; flex-wrap: wrap; }
        .btn { padding: 12px 25px; font-size: 18px; border-radius: 8px; cursor: pointer; font-weight: bold; text-transform: uppercase; transition: all 0.3s; border: none; color: white;}
        .btn.gold { background: linear-gradient(to bottom, #ffd700, #e6c200); color: #800000; box-shadow: 0 4px 0 #b39700; }
        .btn.red { background: linear-gradient(to bottom, #d32f2f, #b30000); box-shadow: 0 4px 0 #800000; }
        .btn:hover { transform: translateY(2px); opacity: 0.9; }

        #qAnswerReveal { display: none; font-size: min(45px, 5vh); color: #ffd700; font-weight: bold; margin: 0 auto 25px; text-shadow: 2px 2px 10px rgba(255, 215, 0, 0.6); background: rgba(139, 0, 0, 0.9); padding: 15px 30px; border-radius: 12px; border: 3px solid #ffd700; text-transform: uppercase; box-shadow: 0 10px 30px rgba(0,0,0,0.5); animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); letter-spacing: 5px; }

        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-15px); } 50% { transform: translateX(15px); } 75% { transform: translateX(-15px); } }
        .shake-anim { animation: shake 0.3s ease-in-out 2; border-color: red !important; }

        #countdownOverlay { display: none; font-size: 180px; color: #ffd700; font-weight: bold; text-shadow: 0 0 40px rgba(255,215,0,1); }
        @keyframes popIn { 0% { transform: scale(0.2); opacity: 0; } 50% { transform: scale(1.2); opacity: 1; } 100% { transform: scale(1); opacity: 1; } }
        .pop-anim { animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        #victoryOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(139,0,0,0.9) 0%, rgba(0,0,0,0.95) 100%);
            z-index: 997; display: none; flex-direction: column; align-items: center; justify-content: center;
        }
        .victory-title { color: #fff; font-size: min(40px, 4vh); font-weight: bold; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 5px; z-index: 1000;}
        .victory-word { font-size: min(100px, 10vw); color: #ffd700; font-weight: bold; text-shadow: 0 0 40px #ffd700, 0 0 80px #ff8c00; text-transform: uppercase; letter-spacing: 15px; animation: popIn 1.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 1000; text-align: center; }

        #darkOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 999; display: none; opacity: 0; transition: opacity 0.1s; pointer-events: none; }
        #fireworksCanvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 998; }

        /* CÀI ĐẶT */
        .settings-panel { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.9); z-index: 2000; align-items: center; justify-content: center; }
        .settings-panel.active { display: flex; }
        .settings-box { background: #fff; width: 85vw; height: 90vh; border-radius: 15px; padding: 20px; color: #000; display: flex; flex-direction: column; }
        .settings-header { display: flex; justify-content: space-between; border-bottom: 2px solid #ccc; padding-bottom: 10px; margin-bottom: 15px;}
        .settings-content { overflow-y: auto; flex: 1; padding-right: 10px; }
        .form-group { margin-bottom: 15px; display: flex; gap: 10px; align-items: center; flex: 0 0 auto; background: #f8f9fa; padding: 15px; border-radius: 8px; border: 1px solid #ddd;}
        .form-label { font-weight: bold; min-width: 140px; text-align: right; color: #e84118; font-size: 2vh;}
        .form-input { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 5px; font-size: 1.8vh; }
        .settings-footer { display: flex; justify-content: flex-end; margin-top: 15px; padding-top: 15px; border-top: 2px solid #ccc; }
        
        .questions-list { border: 2px solid #ddd; border-radius: 8px; background: #fff; padding: 10px; min-height: 300px; display: flex; flex-direction: column; gap:10px;}
        .question-item { display: grid; grid-template-columns: 40px 3.5fr 1.5fr 150px 80px; gap: 10px; align-items: center; padding: 10px; border-bottom: 1px solid #eee; background: #fafafa; }
        .q-header { font-weight: bold; color: #d32f2f; font-size: 14px; text-align: center; padding-bottom: 5px; }
        .golden-input-group { display: flex; align-items: center; gap: 5px; }
        .golden-preview { font-size: 18px; font-weight: bold; color: #d32f2f; background: #ffd700; padding: 5px 10px; border-radius: 4px; min-width: 25px; text-align: center; }
    </style>
</head>
<body>

    <audio id="bgMusic" loop><source src="nhac.mp3" type="audio/mpeg"></audio>
    <audio id="sfxSpin" src="https://actions.google.com/sounds/v1/alarms/bugle_tune.ogg"></audio>
    <audio id="sfxTing" src="https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg"></audio>
    <audio id="sfxFlip" src="https://actions.google.com/sounds/v1/paper/paper_flap.ogg"></audio>
    <audio id="sfxTick" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg"></audio>
    <audio id="clapAudio" src="https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3" preload="auto"></audio>

    <div id="darkOverlay"></div>
    <canvas id="fireworksCanvas"></canvas>

    <div id="victoryOverlay">
        <div class="victory-title">ĐÁP ÁN BÍ ẨN</div>
        <div id="victoryWordText" class="victory-word"></div>
        <button class="btn gold" style="margin-top: 50px; z-index: 1000; font-size: 24px; padding: 15px 40px;" onclick="document.getElementById('victoryOverlay').style.display='none'">TUYỆT VỜI!</button>
    </div>

    <header>
        <h1>MẢNH GHÉP KỲ HÀ</h1>
        <div class="controls">
            <div class="bgm-control" title="Âm lượng Nhạc nền">
                <span style="font-size:20px;">🎵</span>
                <input type="range" id="bgmVolume" min="0" max="1" step="0.05" value="0.2" oninput="changeBGMVolume()">
            </div>
            <button id="btnToggleMusic" onclick="toggleMusic()">🎵 Nhạc: TẮT</button>
            <button class="btn-undo" onclick="toggleFullScreen()">📺 Fullscreen</button> 
            <button onclick="openGuessModal()">🛎️ TRẢ LỜI SỚM</button>
            <button class="btn-settings" onclick="openSettings()">⚙️ Cài Đặt</button>
        </div>
    </header>

    <div class="main-container">
        <div class="puzzle-sidebar" id="board"></div>

        <div class="right-panel" style="flex-direction: column;">
            <div class="puzzle-image-wrapper">
                <img id="secretImage" src="" alt="Hinh Bi Mat">
                <div id="tilesContainer"></div>
            </div>
            <div class="final-keyword-container" id="finalKeyword" style="margin-top: 15px;"></div>
        </div>
    </div>

    <div id="guessModal" class="modal">
        <div class="modal-content" style="max-width: 500px; text-align: center;">
            <div class="modal-header">XÁC NHẬN ĐÁP ÁN CUỐI</div>
            <p style="font-size: 20px; margin-bottom: 30px;">Khán giả đã đoán đúng đáp án chưa?</p>
            <div class="btn-group">
                <button class="btn gold" onclick="handleGuessFinal(true)">✅ CHÍNH XÁC!</button>
                <button class="btn" style="background: #222;" onclick="handleGuessFinal(false)">❌ SAI RỒI</button>
                <button class="btn red" onclick="closeGuessModal()">ĐÓNG</button>
            </div>
        </div>
    </div>

    <div id="questionModal" class="modal">
        <div class="modal-content" id="qModalContentBox">
            <div id="countdownOverlay">3</div>
            <div id="qContentWrapper" style="display: none;">
                <div class="modal-header">Câu Hỏi Số <span id="qNumber"></span></div>
                <div class="question-text">
                    <span id="qText"></span>
                    <span class="char-hint" id="qHint"></span>
                </div>
                <div class="timer-display" id="qTimer">00</div>
                <div id="qAnswerReveal">ĐÁP ÁN</div>
                <div class="btn-group" id="qActionButtons">
                    <button class="btn gold" onclick="handleQuestionGuess(true)">✅ ĐÚNG</button>
                    <button class="btn" style="background: #222;" onclick="handleQuestionGuess(false)">❌ SAI</button>
                    <button class="btn red" onclick="closeQuestion(true)">ĐÓNG</button>
                </div>
            </div>
        </div>
    </div>

    <div class="settings-panel" id="settingsPanel">
        <div class="settings-box">
            <div class="settings-header"><h2>⚙️ Bảng Cài Đặt Dữ Liệu</h2></div>
            <div class="settings-content" id="settingsContent">
                <div class="form-group"><label class="form-label">Link Ảnh Kết Quả:</label><input type="text" id="settingImageUrl" class="form-input"></div>
                <div class="form-group"><label class="form-label">Từ Khóa Cuối:</label><input type="text" id="settingFinalWord" class="form-input" placeholder="VIẾTLIỀNKHÔNGDẤU"></div>
                <div class="form-group" style="background: #e8f4f8; padding: 10px; border-radius: 5px; border: 1px dashed #0088cc;">
                    <label class="form-label">Set thời gian chung:</label>
                    <input type="number" id="settingGlobalTime" class="form-input" value="25" style="max-width: 80px; text-align: center;">
                    <button class="btn gold" style="padding: 8px 15px; font-size: 14px; margin-left:10px;" onclick="applyGlobalTime()">⚡ Áp dụng cho tất cả</button>
                </div>
                <div class="q-header" style="font-size: 18px; margin: 15px 0 10px; text-align:left;">Danh Sách Câu Hỏi (Lưu ý: Game tự xáo trộn vị trí)</div>
                <div class="questions-list">
                    <div class="question-item" style="background: #e0e0e0; position: sticky; top: -10px; z-index: 2;">
                        <div class="q-header">STT</div><div class="q-header">Nội dung câu hỏi</div><div class="q-header">Đáp án (Viết liền)</div><div class="q-header">Chữ Cái Vàng</div><div class="q-header">Giây</div>
                    </div>
                    <div id="questionsFormContainer" style="display:flex; flex-direction:column; gap:5px;"></div>
                </div>
            </div>
            <div class="settings-footer">
                <button style="background: #e74c3c; color: white;" onclick="closeSettings()">Hủy Bỏ</button>
                <button style="background: #2ecc71; color: white;" onclick="saveSettings()">💾 Lưu Cấu Hình</button>
            </div>
        </div>
    </div>

<script>
    var defaultData = {
        "finalWord": "VƯỢTSÓNGRAKHƠI",
        "imageUrl": "https://cdn.hstatic.net/files/200000273197/file/vuot_song_ra_khoi_text_ky_ha__1_.png",
        "questions": [
            { "q": "Món xiên que ăn vặt 'quốc dân' làm từ thịt cá xay nhuyễn?", "a": "CÁVIÊN", "keyIndex": 2, "time": 25 }, 
            { "q": "Loại hải sản thân mềm, vây dày hình bầu dục, thịt ngọt và giòn sần sật?", "a": "MỰCLÁ", "keyIndex": 1, "time": 25 },
            { "q": "Nơi tập trung giao thương mua bán. Khách mua sỉ thường mang ra đây để phân phối lại?", "a": "CHỢSỈ", "keyIndex": 2, "time": 25 },
            { "q": "Loài hải sản được mệnh danh là 'Vua của các loại tôm', có hai càng rất lớn?", "a": "TÔMHÙM", "keyIndex": 0, "time": 25 },
            { "q": "Thương hiệu bào ngư cao cấp mà Hải Sản Kỳ Hà đang kinh doanh là gì?", "a": "NISSI", "keyIndex": 2, "time": 25 },
            { "q": "Công đoạn ở kho trước khi giao hàng cho shipper để đảm bảo độ lạnh và tươi ngon?", "a": "ĐÓNGGÓI", "keyIndex": 1, "time": 25 },
            { "q": "Phần xương sụn giòn sần sật ở khớp hoặc ức gà, chiên nước mắm hay rang muối cực bén?", "a": "SỤNGÀ", "keyIndex": 2, "time": 25 },

    function changeBGMVolume() { userVolume = parseFloat(document.getElementById('bgmVolume').value); if (!isDucking) bgmAudio.volume = userVolume; }
    function fadeBGM(targetVolume, duration) {
        if(!duration) duration = 800;
        clearInterval(duckInterval);
        var startVolume = bgmAudio.volume; var distance = targetVolume - startVolume;
        var steps = 20; var stepTime = duration / steps; var currentStep = 0;
        duckInterval = setInterval(function() {
            currentStep++; var newVol = startVolume + (distance * (currentStep / steps));
            if (newVol < 0) newVol = 0; if (newVol > 1) newVol = 1; bgmAudio.volume = newVol;
            if (currentStep >= steps) clearInterval(duckInterval);
        }, stepTime);
    }

    function playBeep(freq, type, duration, vol) {
        if(!audioCtx) return;
        if(audioCtx.state === 'suspended') audioCtx.resume();
        var oscillator = audioCtx.createOscillator(); var gainNode = audioCtx.createGain();
        oscillator.type = type; oscillator.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gainNode.gain.setValueAtTime(vol, audioCtx.currentTime); gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
        oscillator.connect(gainNode); gainNode.connect(audioCtx.destination);
        oscillator.start(); oscillator.stop(audioCtx.currentTime + duration);
    }

    var soundDrop = function() { playBeep(400, 'sine', 0.3, 0.3); }
    var soundBoom = function() { playBeep(200, 'sawtooth', 0.4, 0.5); setTimeout(function(){playBeep(150, 'square', 0.5, 0.6);}, 50); }
    var soundWin = function() { 
        var notes = [523, 659, 783, 1046, 783, 1318, 1567];

    var soundClap = function() {
        if(!audioCtx) return;
        for(var i=0; i<40; i++) {
            setTimeout(function() {
                var dur = 0.15; var bufferSize = audioCtx.sampleRate * dur; var buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
                var data = buffer.getChannelData(0); for(var j=0; j<bufferSize; j++) data[j] = Math.random() * 2 - 1; 
                var noise = audioCtx.createBufferSource(); noise.buffer = buffer;
                var filter = audioCtx.createBiquadFilter(); filter.type = 'bandpass'; filter.frequency.value = 1000 + Math.random()*500;
                var gain = audioCtx.createGain(); gain.gain.setValueAtTime(0.15, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + dur);
                noise.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination); noise.start();
            }, Math.random() * 2500); 
        }
    };

    // --- TẠO MẢNH GHÉP JIGSAW SVG THẬT SỰ ---
    function generateJigsawPaths(cols, rows) {
        var rightEdge = []; var bottomEdge = [];
        for(var c=0; c<cols; c++) {
            rightEdge[c] = []; bottomEdge[c] = [];
            for(var r=0; r<rows; r++) {
                rightEdge[c][r] = Math.random() > 0.5 ? 1 : -1;
                bottomEdge[c][r] = Math.random() > 0.5 ? 1 : -1;
            }
        }

        var W = 1000 / cols; var H = 1000 / rows;
        var Rw = W * 0.15; var Rh = H * 0.15;

        var paths = [];
        for(var r=0; r<rows; r++) {
            for(var c=0; c<cols; c++) {
                var x = c * W; var y = r * H;
                var d = "M " + x + "," + y + " ";

                if (r === 0) { d += "L " + (x+W) + "," + y + " "; } 
                else {
                    var sweep = bottomEdge[c][r-1] === 1 ? 1 : 0;
                    d += "L " + (x + W*0.4) + "," + y + " ";
                    d += "A " + Rw + " " + Rw + " 0 1 " + sweep + " " + (x + W*0.6) + "," + y + " ";
                    d += "L " + (x+W) + "," + y + " ";
                }

                if (c === cols - 1) { d += "L " + (x+W) + "," + (y+H) + " "; } 
                else {
                    var sweep = rightEdge[c][r] === 1 ? 0 : 1;
                    d += "L " + (x+W) + "," + (y + H*0.4) + " ";
                    d += "A " + Rh + " " + Rh + " 0 1 " + sweep + " " + (x+W) + "," + (y + H*0.6) + " ";
                    d += "L " + (x+W) + "," + (y+H) + " ";
                }

                if (r === rows - 1) { d += "L " + x + "," + (y+H) + " "; } 
                else {
                    var sweep = bottomEdge[c][r] === 1 ? 0 : 1;
                    d += "L " + (x + W*0.6) + "," + (y+H) + " ";
                    d += "A " + Rw + " " + Rw + " 0 1 " + sweep + " " + (x + W*0.4) + "," + (y+H) + " ";
                    d += "L " + x + "," + (y+H) + " ";
                }

                if (c === 0) { d += "L " + x + "," + y + " "; } 
                else {
                    var sweep = rightEdge[c-1][r] === 1 ? 1 : 0;
                    d += "L " + x + "," + (y + H*0.6) + " ";
                    d += "A " + Rh + " " + Rh + " 0 1 " + sweep + " " + x + "," + (y + H*0.4) + " ";
                    d += "L " + x + "," + y + " ";
                }
                d += "Z";
                paths.push({path: d, cx: x + W/2, cy: y + H/2});
            }
        }
        return paths;
    }

    function shuffleArray(array) {
        var currentIndex = array.length, randomIndex;
        while (currentIndex !== 0) { 
            randomIndex = Math.floor(Math.random() * currentIndex); currentIndex--; 
            var temp = array[currentIndex]; array[currentIndex] = array[randomIndex]; array[randomIndex] = temp;
        }
        return array;
    }

                         '<filter id="shadow"><feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.6"/></filter>';

        var pieceToQuestion = [];

        var remain = totalPieces - N;
        for(var j=0; j<remain; j++) pieceToQuestion.push(Math.floor(Math.random() * N)); // Các mảnh dư ghép ngẫu nhiên vào các câu
        pieceToQuestion = shuffleArray(pieceToQuestion); 

        var qHasNumber = {};
        
        for(var i=0; i<paths.length; i++) {

            var textEl = document.createElementNS(svgNS, "text");
            textEl.setAttribute("x", pathData.cx); textEl.setAttribute("y", pathData.cy);
            textEl.setAttribute("fill", "#fff"); textEl.setAttribute("font-size", "50");

            // CHỈ GHI SỐ 1 LẦN CHO MỖI CÂU HỎI DÙ CÓ NHIỀU MẢNH
            if(!qHasNumber[qIdx]) {
                textEl.textContent = (qIdx + 1);
                qHasNumber[qIdx] = true;
            } else {
                textEl.textContent = "";

            g.appendChild(textEl);
            
            if(!rowToTileMap[qIdx]) rowToTileMap[qIdx] = [];

            svg.appendChild(g);
        }
        tilesContainer.appendChild(svg);

        // 3. TẠO BẢNG CÂU HỎI CỘT TRÁI
        var totalFinalChars = data.finalWord ? data.finalWord.length : playQuestions.length;
        for(var i=0; i<playQuestions.length; i++) {

                var rowDiv = document.createElement('div'); rowDiv.className = 'puzzle-row'; rowDiv.id = 'row-' + index;
                rowDiv.onclick = function() { openQuestion(index); };
                var numDiv = document.createElement('div'); numDiv.className = 'puzzle-row-num'; numDiv.innerText = index + 1; rowDiv.appendChild(numDiv);
                for (var j = 0; j < q.a.length; j++) {

        // TẠO Ô ĐÁP ÁN CUỐI
        for(var i=0; i<totalFinalChars; i++) {
            var finalCell = document.createElement('div'); finalCell.className = 'final-cell'; finalCell.id = 'final-cell-' + i; finalCell.innerText = '?';
            finalWordContainer.appendChild(finalCell);

    function startTimer() {
        var timeLeft = playQuestions[currentRowIndex].time; 
        var timerStr = String(timeLeft); if(timerStr.length < 2) timerStr = '0' + timerStr;
        document.getElementById('qTimer').innerText = timerStr;
        timerInterval = setInterval(function() {
            timeLeft--; 
            var ts = String(timeLeft); if(ts.length < 2) ts = '0' + ts;
            document.getElementById('qTimer').innerText = ts;
            if(timeLeft > 0 && timeLeft <= 5) { playBeep(1200, 'square', 0.05, 0.3); setTimeout(function() { playBeep(1200, 'square', 0.05, 0.3); }, 500); }
            if (timeLeft <= 0) { clearInterval(timerInterval); playBeep(300, 'sawtooth', 0.8, 0.8); }
        }, 1000);
    }

    function handleQuestionGuess(isCorrect) {
        clearInterval(timerInterval); 
        var q = playQuestions[currentRowIndex];
        
        if (isCorrect) {
            var keyChar = q.a[q.keyIndex];
            speakText("Chính xác! Chúc mừng bạn nhận được lì xì, chúng ta có được chữ cái, " + keyChar + ", cho câu trả lời bí ẩn.");
            
            document.getElementById('qActionButtons').style.display = 'none'; document.getElementById('qTimer').style.display = 'none';
            var answerReveal = document.getElementById('qAnswerReveal'); answerReveal.innerText = q.a; answerReveal.style.display = 'block';
            
            var row = document.getElementById('row-' + currentRowIndex); row.classList.add('disabled');

                (function(idx){ setTimeout(function() { document.getElementById('cell-' + currentRowIndex + '-' + idx).classList.add('revealed'); }, idx * 150); })(i); 
            }

            setTimeout(function() {
                var targetCell = document.getElementById('final-cell-' + revealedLettersCount);
                if(targetCell) { targetCell.innerText = keyChar; targetCell.classList.add('filled'); soundDrop(); revealedLettersCount++; }
            }, q.a.length * 150 + 300);

            // MỞ NHỮNG MẢNH GHÉP ĐƯỢC GÁN VỚI CÂU NÀY
            var mappedPieces = rowToTileMap[currentRowIndex];
            if(mappedPieces) { 
                for(var m=0; m<mappedPieces.length; m++) {
                    mappedPieces[m].style.opacity = "0"; 
                    mappedPieces[m].style.transform = "scale(0.8) translateY(30px)";
                    mappedPieces[m].style.pointerEvents = "none";

            setTimeout(function() {

                for(var k=0; k<finalCells.length; k++) { if(finalCells[k].innerText === '?') { allRevealed = false; break; } }
                closeQuestion(false); 
                if(allRevealed) { setTimeout(function() { triggerWinSequence(); }, 500); } 
            }, q.a.length * 150 + 3000);

            var contentBox = document.getElementById('qModalContentBox'); contentBox.classList.add('shake-anim');
            setTimeout(function() { contentBox.classList.remove('shake-anim'); closeQuestion(true); }, 2500);

    function createFirework(x, y) {
        var colors = ['#ffd700', '#ff8c00', '#ff0000', '#00ff00', '#00ffff', '#ff00ff'];
        for(var i=0; i<80; i++) { particles.push({ x: x, y: y, vx: (Math.random() - 0.5) * 15, vy: (Math.random() - 0.5) * 15, color: colors[Math.floor(Math.random() * colors.length)], alpha: 1, size: Math.random() * 4 + 2, friction: 0.95, gravity: 0.2 }); }
    }

    function drawFireworks() {
        if(!fireworksActive) return; ctx.clearRect(0, 0, canvas.width, canvas.height);
        for(var i=0; i<particles.length; i++) {
            var p = particles[i]; p.vx *= p.friction; p.vy *= p.friction; p.vy += p.gravity; p.x += p.vx; p.y += p.vy; p.alpha -= 0.015;
            if(p.alpha <= 0) { particles.splice(i, 1); i--; continue; }
            ctx.globalAlpha = p.alpha; ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
        }
        if(Math.random() < 0.08) createFirework(Math.random() * canvas.width, Math.random() * canvas.height * 0.5);
        requestAnimationFrame(drawFireworks);
    }

    function startFireworks() {
        if(fireworksActive) return; fireworksActive = true;
        createFirework(canvas.width/2, canvas.height/3); drawFireworks();
        setTimeout(function() { fireworksActive = false; ctx.clearRect(0, 0, canvas.width, canvas.height); }, 8000);
    }

    // --- CÀI ĐẶT ---
    function updateGoldenPreview(inputElem) {
        var row = inputElem.closest('.question-item'); var aInput = row.querySelector('.a-input').value.trim().toUpperCase();
        var kInput = parseInt(row.querySelector('.k-input').value) || 1; var preview = row.querySelector('.golden-preview');
        if(aInput.length > 0 && kInput > 0 && kInput <= aInput.length) { preview.innerText = '[ ' + aInput[kInput - 1] + ' ]'; preview.style.color = '#fff'; } else { preview.innerText = '[ ? ]'; preview.style.color = '#ffd700'; }
    }
    function applyGlobalTime() {
        var t = parseInt(document.getElementById('settingGlobalTime').value); if(isNaN(t) || t < 5) t = 25; 
        var inputs = document.querySelectorAll('.t-input');
        for(var i=0; i<inputs.length; i++) inputs[i].value = t;
    }
    function openSettings() {
        document.getElementById('settingImageUrl').value = gameData.imageUrl; document.getElementById('settingFinalWord').value = gameData.finalWord;
        var container = document.getElementById('questionsFormContainer'); container.innerHTML = '';
        for(var i=0; i<gameData.questions.length; i++) {
            var q = gameData.questions[i];
            var item = document.createElement('div'); item.className = 'question-item';
            var charKey = q.a[q.keyIndex] || '?';
            item.innerHTML = '<div style="text-align:center; font-weight:bold">' + (i + 1) + '</div><input type="text" class="form-input q-input" value="' + q.q + '"><input type="text" class="form-input a-input" value="' + q.a + '" style="text-transform:uppercase" oninput="updateGoldenPreview(this)"><div class="golden-input-group"><input type="number" class="form-input k-input" value="' + (q.keyIndex + 1) + '" min="1" style="width:50px;text-align:center" oninput="updateGoldenPreview(this)"><div class="golden-preview">[ ' + charKey + ' ]</div></div><input type="number" class="form-input t-input" value="' + q.time + '" min="5" style="text-align:center">';
            container.appendChild(item);
        }
        document.getElementById('settingsModal').style.display = 'flex';
    }
    function closeSettings() { document.getElementById('settingsModal').style.display = 'none'; }
    function saveSettings() {
        var newQ = []; 
        var items = document.querySelectorAll('.question-item');
        for(var i=0; i<items.length; i++) {
            var item = items[i];
            var qInput = item.querySelector('.q-input'); if(!qInput) continue; 
            var q = qInput.value.trim(); var a = item.querySelector('.a-input').value.trim().toUpperCase();
            var k = parseInt(item.querySelector('.k-input').value) - 1; var t = parseInt(item.querySelector('.t-input').value);
            if(q && a) { if(isNaN(k) || k<0) k=0; if(k>=a.length) k=a.length-1; if(isNaN(t) || t<5) t=25; newQ.push({ q: q, a: a, keyIndex: k, time: t }); }
        }
        if(newQ.length===0) return alert("Phải có ít nhất 1 câu hỏi!");
        gameData.imageUrl = document.getElementById('settingImageUrl').value.trim() || defaultData.imageUrl; gameData.finalWord = document.getElementById('settingFinalWord').value.trim().toUpperCase() || ""; gameData.questions = newQ; initGame(gameData); closeSettings(); alert("Đã lưu thành công!");
    }

    window.onload = function() {
        loadVoices(); 
        var firstClick = function() {
            if(audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
            bgmAudio.volume = userVolume; var p1 = bgmAudio.play(); if(p1 && p1.catch) p1.catch(function(e){});
            var clapAudio = document.getElementById('clapAudio'); if(clapAudio) { clapAudio.volume = 0; var p2 = clapAudio.play(); if(p2 && p2.then) { p2.then(function() { clapAudio.pause(); clapAudio.currentTime = 0; clapAudio.volume = 1; }).catch(function(e){}); } }
            if ('speechSynthesis' in window) { try{ var msg = new SpeechSynthesisUtterance(''); window.speechSynthesis.speak(msg); }catch(e){} }
            document.body.removeEventListener('click', firstClick);
        };
        document.body.addEventListener('click', firstClick);
        initGame(defaultData);
    };
</script>
